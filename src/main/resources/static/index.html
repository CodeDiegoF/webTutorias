<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG IN</title>
    <link rel="stylesheet" href="styleLogin.css">
</head>

<body>

    <div class="container">
        <div class="container-form">
            <form class="sign-in">
                <h2>INICIA SESIÓN</h2>
                <span>Use su nombre de usuario y contraseña</span>

                <div class="container-input">
                    <ion-icon name="mail-outline"></ion-icon>
                    <input type="email" id="login-email" placeholder="Correo Electrónico"
                           pattern="^[^@]+@ujaen\.es$" title="Por favor, introduce tu correo de la UJA (@ujaen.es)" required>
                </div>

                <div class="container-input">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" id="login-password" placeholder="Contraseña"  required>
                </div>
                <a href="#">¿Olvidaste tu contraseña?</a><br>
                <button type="submit">INICIAR SESIÓN</button>
            </form>
        </div>

        <div class="container-form">
            <form class="sign-up">
                <h2>REGÍSTRATE</h2>
                <span>Complete el formulario para crear una cuenta</span>

                <div class="container-input">
                    <ion-icon name="person-circle-outline"></ion-icon>
                    <input type="text" id="registro-nombre" placeholder="Nombre de Usuario"  required>
                </div>

                <div class="container-input">
                    <ion-icon name="mail-outline"></ion-icon>
                    <input type="email" id="registro-email"
                           placeholder="Correo Electrónico" pattern="^[^@]+@ujaen\.es$" title="Por favor, introduce tu correo de la UJA (@ujaen.es)" required>
                </div>

                <div class="container-input">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" id="registro-password" placeholder="Contraseña" required>
                </div>
                <button type="submit">REGISTRARSE</button>
            </form>
        </div>

        <div class="container-welcome">

            <div class="welcome-sign-up welcome">
                <h3>BIENVENIDO</h3>
                <p>¡Crea tu cuenta para comenzar!</p>
                <button id="sign-up-btn">REGISTRARSE</button>
            </div>

            <div class="welcome-sign-in welcome">
                <h3>¡HOLA DE NUEVO!</h3>
                <p>Si ya tienes una cuenta, inicia sesión aquí</p>
                <button id="sign-in-btn">INICIAR SESIÓN</button>
            </div>

        </div>

    </div>
  
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="login.js"></script>
</body>
</html>
