<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>RESERVA TU TUTORÍA</title>
    <link rel="stylesheet" type="text/css" href="style.css">

</head>

<body>
    <div class="container">
        <h1>RESERVA TU TUTORÍA</h1>
        <div id="horarios-container"></div>
        <form id="reserva-form">
            <!-- Campo Nombre -->
            <label for="nombreAlumno">Nombre:</label>
            <input type="text" id="nombreAlumno" name="nombre" required>
            <br/>

            <!-- Campo Fecha -->
            <label for="fecha">Fecha de la tutoría:</label>
            <input type="date" id="fecha" name="fecha" required>
            <br/>

            <!-- Campo Hora -->
            <label for="hora">Hora de la tutoría:</label>
            <input type="time" id="hora" name="hora" required>
            <br/>

            <button type="submit">Reservar</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
