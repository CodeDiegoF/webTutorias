<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESERVA TU TUTORÍA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>



</head>

<body>
<div class="container py-5" style="max-width: 700px;">
    <div class="panel-header">
        <h1>RESERVA TUS TUTORÍAS</h1>
    </div>

    <div class="card-custom">
        <h2 class="mb-3">📅 Horarios disponibles</h2>
        <div id="horarios-container" class="row g-2 mb-3">
        </div>
    </div>

        <hr>

        <h5 class="mb-3">✏️ Completa con tus datos</h5>
        <form id="reserva-form">
            <div class="row g-3">
                <div class="col-md-6 text-center">
                    <label for="nombreAlumno" class="form-label">Nombre Completo</label>
                    <input type="text" id="nombreAlumno" name="nombre" class="form-control" required>
                </div>

                <input type="date" id="fecha" name="fecha" required hidden>

                <input type="time" id="hora" name="hora" required hidden>

                <div class="col-12 text-center">
                    <button type="submit" class="btn btn-warning fw-bold px-5">Reservar</button>
                </div>
            </div>
        </form>
        <hr>
        <div class="card-custom">
            <h2 class="mb-3">📋 Mis tutorías reservadas</h2>
            <div id="reservas-container" class="d-flex flex-column gap-3">
                <p style="color:#f5f5f5">No tienes tutorías reservadas.</p>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="reservaScript.js"></script>
</body>
</html>
