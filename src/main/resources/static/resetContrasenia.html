<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer contraseña</title>
    <link rel="stylesheet" href="styleLogin.css">
</head>
<body>
<div class="container" style="max-width: 450px;">
    <div class="container-form" style="width: 100%;">
        <form class="sign-in" id="reset-form">
            <h2>NUEVA CONTRASEÑA</h2>
            <span>Introduce tu nueva contraseña</span>

            <div class="container-input">
                <ion-icon name="lock-closed-outline"></ion-icon>
                <input type="password" id="nueva-password"
                       placeholder="Nueva contraseña" required>
            </div>

            <div class="container-input">
                <ion-icon name="lock-closed-outline"></ion-icon>
                <input type="password" id="confirmar-password"
                       placeholder="Confirmar contraseña" required>
            </div>

            <button type="submit">GUARDAR CONTRASEÑA</button>
        </form>
    </div>
</div>

<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
<script src="resetContrasenia.js"></script>
</body>
</html>
