<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PANEL DEL PROFESOR</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
<div class="container">
    <h1>INDICA LOS HORARIOS DISPONIBLES</h1>

    <div id="horarios-container"></div>

    <form id="horario-form">
        <label for="fecha">Fecha de la tutoría:</label>
        <input type="date" id="fecha" name="fecha" required>
        <br/>

        <label for="hora">Hora de la tutoría:</label>
        <input type="time" id="hora" name="hora" required>
        <br/>

        <button type="submit">Confirmar Disponibilidad</button>
    </form>

    <h2>TUTORÍAS RESERVADAS</h2>
    <div id="reservas-container"></div>
</div>

<script src="admin.js"></script>
</body>
</html>
