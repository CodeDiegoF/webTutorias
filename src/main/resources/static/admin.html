<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PANEL DEL PROFESOR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>
        body {
            color: hsl(57, 91%, 50%);
            background: hsla(0, 0%, 0%, 0.54);
        }

        .container {
            position: absolute;
            margin: 150px;
            left: 25%;
            padding: 10px 10px 50px 5px;
            width: 500px;
            line-height: 25px;
            color: #dcb800;
            text-shadow: 0 1px 1px #000000;
            background-color: #0c0800;
            border: 5px solid rgba(238, 214, 4, 0.9);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-custom {
            background-color: #0c0800;
            border: 3px solid rgba(238, 214, 4, 0.9);
            border-radius: 12px;
            color: #dcb800;
            padding: 1.5rem;
            margin-top: 1.5rem;
        }

        .form-control:focus {
            background-color: #1a1500;
            border-color: #dcb800;
            color: #dcb800;
            box-shadow: 0 0 0 0.2rem rgba(255, 255, 255, 0.788);
        }

        .btn:hover {
            background-color: #f5f5f5 !important;
            color: #000000 !important;
            border-color: #f5f5f5 !important;
            transition: all 0.2s ease;
        }
        .card:hover {
            transform: translateY(-3px);
        }

        hr {
            border-color: rgba(255, 255, 255, 1);
        }

        .horario-slot {
            background-color: #1a1500;
            border: 2px solid rgba(238,214,4,0.4);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #dcb800;
            text-align: center;
        }

        .horario-slot:hover {
            border-color: #dcb800;
            background-color: #2a2000;
            transform: translateY(-5px);
            height: fit-content;
            box-shadow: 0 0 8px rgba(220,184,0,0.3);
        }

        .reserva-item {
            background-color: #1a1500;
            border: 1px solid rgba(238, 214, 4, 0.4);
            border-radius: 10px;
            padding: 0.75rem 1.2rem;
            color: #dcb800;
            transition: background 0.2s;
        }

        .reserva-item:hover {
            background-color: #2a2000;
            border-color: #dcb800;
        }

        #horarios-container {
            max-height: 200px;
            overflow-y: auto;
        }

        #reservas-container {
            max-height: 300px;
            overflow-y: auto;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0c0800; }
        ::-webkit-scrollbar-thumb { background: #dcb800; border-radius: 3px; }
    </style>
</head>

<body>
<div class="container py-5" style="max-width: 720px;">

    <!-- Formulario añadir horario -->
    <div class="card-custom p-4 mb-4">
        <h1 class="text-center mb-4 fs-3 fw-bold">PANEL DEL PROFESOR</h1>

        <h5 class="mb-3">➕ Añadir horario disponible</h5>
        <form id="horario-form">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label for="fecha" class="form-label">Fecha</label>
                    <input type="date" id="fecha" name="fecha" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label for="hora" class="form-label">Hora</label>
                    <input type="time" id="hora" name="hora" class="form-control" required>
                </div>
                <div class="col-12 text-center">
                    <button type="submit" class="btn btn-warning fw-bold px-5">Confirmar</button>
                </div>
            </div>
        </form>

        <hr class="my-4">

        <!-- Lista de horarios -->
        <h5 class="mb-3">📅 Horarios creados</h5>
        <div id="horarios-container" class="row g-2 mb-3">
            <p style="color:#888">Cargando horarios...</p>
        </div>
    </div>

    <!-- Tutorías reservadas -->
    <div class="card-custom p-4">
        <h5 class="mb-3">📋 Tutorías reservadas</h5>
        <div id="reservas-container" class="d-flex flex-column gap-2">
            <p style="color:#888">Cargando reservas...</p>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="admin.js"></script>
</body>

</html>
