<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PANEL DEL PROFESOR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container py-4">
    <div class="panel-header">
        <h1>PANEL DEL PROFESOR</h1>
        <p>Gestiona tu disponibilidad y tutorías</p>
    </div>
    <div class="card-custom">
        <h5>📅 Horarios creados</h5>
        <div class="mb-3 d-flex gap-2">
            <button class="btn btn-warning btn-sm" onclick="filtrarHorarios('todos')">Todos</button>
            <button class="btn btn-warning btn-sm" onclick="filtrarHorarios('libre')">Libres</button>
            <button class="btn btn-warning btn-sm" onclick="filtrarHorarios('ocupado')">Ocupados</button>
        </div>
        <h5>➕ Añadir horario disponible</h5>
        <form id="horario-form">
            <div class="row g-3 align-items-end">
                <div class="col-md-5">
                    <label for="fecha" class="form-label">Fecha</label>
                    <input type="date" id="fecha" name="fecha" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label for="hora" class="form-label">Hora</label>
                    <input type="time" id="hora" name="hora" class="form-control" required>
                </div>
                <div class="col-12 text-center mt-2">
                    <button type="submit" class="btn btn-warning fw-bold px-5">Confirmar Horario</button>
                </div>
            </div>
        </form>
        <hr>
        <h5>📅 Horarios creados</h5>
        <div id="horarios-container" class="row g-2">
            <p style="color:#888">Cargando horarios...</p>
        </div>
    </div>
    <div class="card-custom">
        <h5>👥 Tutorías reservadas</h5>
        <input type="text" id="buscador-reservas" class="form-control mb-3"
               placeholder="🔍 Buscar por nombre...">
        <div id="reservas-container" class="d-flex flex-column gap-2">
            <p style="color:#888">Cargando reservas...</p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="admin.js"></script>
</body>
</html>
